      #       ghcr.io/otter-aerospace/ubuntu-dind:${{ matrix.ubuntu_name }}-systemd-test

      # - name: Test systemd image (privileged mode)
      #   run: |
      #     ./test.sh --mode privileged --use-systemd true --image-name ghcr.io/otter-aerospace/ubuntu-dind:${{ matrix.ubuntu_name }}-systemd-test

      # - name: Test systemd image (sysbox-runc mode)
      #   run: |
      #     ./test.sh --mode sysbox-runc --use-systemd true --image-name ghcr.io/otter-aerospace/ubuntu-dind:${{ matrix.ubuntu_name }}-systemd-test

